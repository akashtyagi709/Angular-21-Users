<div class="page">
  <div class="header">
    <h2>Add New User</h2>
    <button class="logout-btn" (click)="logout()">Logout</button>
    <button class="view-btn" (click)="seeMebers()">See All Members</button>
  </div>

  <div class="card">
    <form (submit)="addUser()">
      
      <div class="form-group">
        <label>Full Name</label>
        <input [(ngModel)]="name" name="name" placeholder="Enter full name" />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input [(ngModel)]="email" name="email" placeholder="Enter email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input [(ngModel)]="password" name="password" type="password" placeholder="Enter password" />
      </div>

      <button type="submit" class="submit-btn">
        Create User
      </button>

    </form>
  </div>
</div>
